<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26週後の日付計算</title>
<style>
  :root {
    --ink: #2b2b2e;
    --muted: #8c8a85;
    --line: #e4e1da;
    --bg: #f3f1ec;
    --card: #fbfaf7;
    --accent: #9a8466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", -apple-system, serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 48px 40px 40px;
    box-shadow: 0 18px 50px rgba(60, 50, 35, 0.08);
  }

  .eyebrow {
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-size: 0.66rem;
    font-weight: 500;
    letter-spacing: 0.38em;
    text-indent: 0.38em;
    text-transform: uppercase;
    color: #b3a384;
    text-align: center;
    margin-bottom: 18px;
  }

  h1 {
    font-size: 1.55rem;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 14px;
  }

  .rule {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 16px;
  }

  .sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.7;
    margin-bottom: 34px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  input[type="date"] {
    width: 100%;
    padding: 14px 14px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 3px;
    margin-bottom: 22px;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  button {
    width: 100%;
    padding: 15px;
    font-size: 0.92rem;
    font-family: inherit;
    letter-spacing: 0.16em;
    color: #fff;
    background: var(--ink);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.25s;
  }
  button:hover { background: #000; }

  .result {
    margin-top: 32px;
    padding-top: 30px;
    border-top: 1px solid var(--line);
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .result.show { opacity: 1; transform: translateY(0); }

  .result .label {
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-size: 0.64rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-indent: 0.3em;
    text-transform: uppercase;
    color: #b3a384;
    margin-bottom: 14px;
  }
  .result .date {
    font-size: 2.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .result .weekday {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .result .note {
    margin-top: 18px;
    font-size: 0.76rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .footer {
    margin-top: 30px;
    text-align: center;
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-size: 0.64rem;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-indent: 0.28em;
    color: #c4bdb0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">26 Weeks Later</div>
    <h1>26週後の日付</h1>
    <div class="rule"></div>
    <p class="sub">入力した日付の26週後（182日後）を<br>曜日とともにお調べします。</p>

    <label for="baseDate">基準となる日付</label>
    <input type="date" id="baseDate">
    <button id="calcBtn">計 算 す る</button>

    <div class="result" id="result">
      <div class="label">26 weeks later</div>
      <div class="date" id="resultDate"></div>
      <div class="weekday" id="resultWeekday"></div>
      <div class="note" id="resultNote"></div>
    </div>

    <div class="footer">26 WEEKS = 182 DAYS</div>
  </div>

<script>
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  const input = document.getElementById("baseDate");
  const btn = document.getElementById("calcBtn");
  const result = document.getElementById("result");
  const resultDate = document.getElementById("resultDate");
  const resultWeekday = document.getElementById("resultWeekday");
  const resultNote = document.getElementById("resultNote");

  input.value = new Date().toISOString().slice(0, 10);

  function calculate() {
    const val = input.value;
    if (!val) { input.focus(); return; }
    const [y, m, d] = val.split("-").map(Number);
    const base = new Date(y, m - 1, d);

    const target = new Date(base);
    target.setDate(target.getDate() + 182);

    const ty = target.getFullYear();
    const tm = target.getMonth() + 1;
    const td = target.getDate();
    const wd = weekdays[target.getDay()];

    resultDate.textContent = `${ty}年${tm}月${td}日`;
    resultWeekday.textContent = `${wd}曜日`;
    resultNote.textContent = `${y}年${m}月${d}日 の182日後`;

    result.classList.remove("show");
    void result.offsetWidth;
    result.classList.add("show");
  }

  btn.addEventListener("click", calculate);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") calculate(); });
</script>
</body>
</html>
